        var clusterNiC = 'b32';

        var randomIdNice = '';
        let NicHomeURL = "https://home-" + clusterNiC + ".nice-incontact.com";

        var chatSrc = document.createElement("script");
        chatSrc.src = NicHomeURL + "/inContact/ChatClient/js/embed.min.js";

        var head = document.getElementsByTagName("head")[0];
        head.appendChild(chatSrc);

        chatSrc.onload = function () {
            (function (s, u, r, f, l, y) {
                s[f] = s[f] || { init: function () { s[f].q = arguments; } };
                l = u.createElement(r); y = u.getElementsByTagName(r)[0]; l.async = 1;
                l.src = 'https://surfly.com/surfly.js'; y.parentNode.insertBefore(l, y);
            })
                (window, document, 'script', 'Surfly');
            loadSurfly();
        };

        // Start a Work Item
        function signalWorkItem(leaderLink) {
            randomId();
            console.log('signal Work Item');
            var url = new URL(videoSignalerURL);
            url.searchParams.set('p1', 'startWorkItem');
            url.searchParams.set('p2', leaderLink);

        // End a workItem

            var url = new URL(videoSignalerURL);
            url.searchParams.set('p1', 'endWorkItem');
            url.searchParams.set('p2', leaderLink);

            fetch(url, { mode: "no-cors" });
        }

         // Create Videochat Session
        function createVideochatSession() {
            if (!validateScheduleAccess().ok) {
                applyUrlScheduleGate();
                return;
            }
            var videochatSession = Surfly.session({
                block_until_agent_joins: false,
                hide_until_agent_joins: true,
                videochat_autostart: true,
                start_with_fullscreen_videochat: true,
                videochat_prompt: true,
                start_muted: false,
                anyone_can_deactivate_space: true,
            });

            videochatSession.on("session_created", function (session, event) {
                console.log('Waiting for confirmation');
                session.startLeader(null, { name: "Agent" });
            }).on("session_started", function (session, event) {
                var surflySessionPin = session.pin;
                var surflyLeaderLink = session.followerLink;
                signalWorkItem(surflyLeaderLink);
                console.log("Videochat session started");
                console.log('Session Pin: ' + surflySessionPin);
                // Display the Queue Spinner
                var spinner = document.querySelector("#spinner-container");
                spinner.classList.remove("hidden");

                var cancelButton = document.querySelector("#btn-cancel-session");
                // If the Cancel button is clicked, end the work item and end the session
                cancelButton.addEventListener("click", function () {
                    session.end();
                });

                // Remove the button
                var button = document.querySelector("#start-button");
                button.classList.add("hidden");
            }).on("viewer_joined", function (session, event) {
                window.nicVideochatContactId = event.userData.contactId;
            }).on("session_ended", function (session, event) {
                console.log("Videochat session ended", event, session);

                endWorkItem(session.followerLink);

                // Remove the Queue Spinner
                var spinner = document.querySelector("#spinner-container");
                spinner.classList.add("hidden");
                // Add the button
                var button = document.querySelector("#start-button");
                button.classList.remove("hidden");
            }).create();
        };

        function cancelSession() {
            console.log("Canceling session...");
            var currentSession = Surfly.session();
            if (currentSession) {
                currentSession.end();
            }
        }


        function loadSurfly() {
            // Setup settings from API
            var settings = {
                widget_key: surflyWidgetKey,
                auto_restore: false,
                session_start_confirmation: false,
                hidden: false,
                disable_end_redirect: true,
                require_password: false,
                agent_can_request_control: true,
                automated_session_recording_enabled: true,
                end_redirect_enabled: true,
                new_urls_allowed: true,
                non_hosts_can_open_tabs: true,
            };

            Surfly.init(settings, function (initResult) {
                if (initResult.success) {
                    if (!Surfly.isInsideSession) {

                        if (localStorage.getItem(nicBusNumber + "-uniquePageId")) {
                            console.log("random: " + localStorage.getItem(nicBusNumber + "-uniquePageId"));
                        } else {
                            let randomString = Math.random().toString(36).substring(7);
                            let dateNow = Date.now();
                            let uniquePageId = randomString + "-" + dateNow;

                            console.log("random: " + uniquePageId);

                            localStorage.setItem(nicBusNumber + "-uniquePageId", uniquePageId);
                        }

                    }
                }
            });
        }

        function randomId() {
            console.log('it got here');
            let randomString = Math.random().toString(36).substring(7);
            let dateNow = Date.now();
            let uniquePageId = randomString + "-" + dateNow;
            console.log("random ID for Nice: " + uniquePageId);
            randomIdNice = uniquePageId;
        }

        /** Scheduled slot is interpreted as wall time in fixed GMT+1 (UTC+01:00, no DST). */
        var SCHEDULE_GMT1_OFFSET = '+01:00';

        /** Join window: minutes before / after scheduled instant (GMT+1). */
        var SCHEDULE_JOIN_EARLY_MIN = 2;
        var SCHEDULE_JOIN_LATE_MIN = 5;

        function getQueryParams() {
            var params = new URLSearchParams(window.location.search);
            return {
                name: (params.get('name') || '').trim(),
                email: (params.get('email') || '').trim(),
                date: (params.get('date') || '').trim(),
                time: (params.get('time') || '').trim()
            };
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        /**
         * Parses date (YYYY-MM-DD) and time (HH:mm or HH:mm:ss) as wall clock in GMT+1 (UTC+01:00).
         * Returns Date (absolute instant) or null if invalid.
         */
        function parseScheduledGmtPlus1(dateStr, timeStr) {
            if (!dateStr || !timeStr) return null;
            if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return null;
            var tp = timeStr.split(':').map(function (x) { return x.trim(); });
            if (tp.length < 2 || tp.length > 3) return null;
            var h = parseInt(tp[0], 10), m = parseInt(tp[1], 10), s = tp[2] !== undefined ? parseInt(tp[2], 10) : 0;
            if (isNaN(h) || isNaN(m) || isNaN(s) || h < 0 || h > 23 || m < 0 || m > 59 || s < 0 || s > 59) return null;
            var pad = function (n) { return n < 10 ? '0' + n : String(n); };
            var t = pad(h) + ':' + pad(m) + ':' + pad(s);
            var iso = dateStr + 'T' + t + SCHEDULE_GMT1_OFFSET;
            var d = new Date(iso);
            if (isNaN(d.getTime())) return null;
            return d;
        }

        function validateScheduleAccess() {
            var q = getQueryParams();
            if (!q.name || !q.email || !q.date || !q.time) {
                return { ok: false, reason: 'missing', message: 'This link is incomplete. It should include your name, email, date, and time.' };
            }
            if (!isValidEmail(q.email)) {
                return { ok: false, reason: 'email', message: 'The email in this link does not look valid.' };
            }
            var scheduled = parseScheduledGmtPlus1(q.date, q.time);
            if (!scheduled) {
                return { ok: false, reason: 'datetime', message: 'The date or time in this link is not valid. Use YYYY-MM-DD and HH:mm (24h), interpreted as GMT+1.' };
            }
            var now = Date.now();
            var start = scheduled.getTime() - SCHEDULE_JOIN_EARLY_MIN * 60 * 1000;
            var end = scheduled.getTime() + SCHEDULE_JOIN_LATE_MIN * 60 * 1000;
            if (now < start) {
                return { ok: false, reason: 'early', message: 'Video chat opens ' + SCHEDULE_JOIN_EARLY_MIN + ' minutes before your scheduled time (GMT+1).' };
            }
            if (now > end) {
                return { ok: false, reason: 'late', message: 'This scheduled session window has ended (' + SCHEDULE_JOIN_LATE_MIN + ' minutes after your GMT+1 time). Please request a new link.' };
            }
            return { ok: true, scheduled: scheduled, query: q };
        }

        function applyUrlScheduleGate() {
            var q = getQueryParams();
            var btn = document.getElementById('startVideoBtn');
            var statusEl = document.getElementById('schedule-status');
            var guestEl = document.getElementById('guest-line');
            var result = validateScheduleAccess();

            if (guestEl) {
                guestEl.textContent = q.name ? 'Welcome, ' + q.name + '.' : '';
            }

            if (!btn || !statusEl) return;

            if (result.ok) {
                btn.disabled = false;
                btn.removeAttribute('aria-disabled');
                statusEl.textContent = 'You are within your join window (' + SCHEDULE_JOIN_EARLY_MIN + ' min before–' + SCHEDULE_JOIN_LATE_MIN + ' min after your GMT+1 time). Tap below when you are ready.';
                statusEl.className = 'schedule-status schedule-status--ok';
            } else {
                btn.disabled = true;
                btn.setAttribute('aria-disabled', 'true');
                statusEl.textContent = result.message;
                statusEl.className = 'schedule-status schedule-status--bad';
            }
        }

        </div>
    </div>
