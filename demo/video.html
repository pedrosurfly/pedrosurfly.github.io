<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon"
        href="https://www.navyfederal.org/etc.clientlibs/nfculibs/clientlibs/uife/clientlib-uife-nfculibs-site/resources/images/favicon.ico"
        type="image/x-icon">
    <title>Member Connect</title>
    <script>
        var showVideoChatButton = false;
        var nicBusNumber = '4599130';
        var nicChatPOC = '1605d414-489c-4df4-83b1-334dbeb0ab2c';
        var clusterNiC = 'b32';
        var surflyWidgetKey = '134f5fd2ac8842c0a1cd6062818eee74';
        var videoSignalerURL = "https://home-b32.nice-incontact.com/inContact/Manage/Scripts/Spawn.aspx?scriptName=Surfly_Signaler&bus_no=4599130&scriptId=197588198&skill_no=4137191&p1=&p2=&p3=&p4=&p5=&Guid=602c459a-c935-4539-9fa0-0827ab102c74";
        var randomIdNice = '';
        let NicHomeURL = "https://home-" + clusterNiC + ".nice-incontact.com";

        var chatSrc = document.createElement("script");
        chatSrc.src = NicHomeURL + "/inContact/ChatClient/js/embed.min.js";

        var head = document.getElementsByTagName("head")[0];
        head.appendChild(chatSrc);

        chatSrc.onload = function () {
            (function (s, u, r, f, l, y) {
                s[f] = s[f] || { init: function () { s[f].q = arguments; } };
                l = u.createElement(r); y = u.getElementsByTagName(r)[0]; l.async = 1;
                l.src = 'https://surfly.com/surfly.js'; y.parentNode.insertBefore(l, y);
            })
                (window, document, 'script', 'Surfly');
            loadSurfly();
        };

        // Start a Work Item
        function signalWorkItem(leaderLink) {
            randomId();
            console.log('signal Work Item');
            var url = new URL(videoSignalerURL);
            url.searchParams.set('p1', 'startWorkItem');
            url.searchParams.set('p2', leaderLink);
            url.searchParams.set('p3', randomIdNice);
            fetch(url, { mode: "no-cors" });
        }

        // End a workItem
        function endWorkItem(leaderLink) {
            console.log('End Work Item', randomIdNice);
            var url = new URL(videoSignalerURL);
            url.searchParams.set('p1', 'endWorkItem');
            url.searchParams.set('p2', leaderLink);
            url.searchParams.set('p3', randomIdNice);
            fetch(url, { mode: "no-cors" });
        }

         // Create Videochat Session
        function createVideochatSession() {
            var videochatSession = Surfly.session({
                block_until_agent_joins: false,
                hide_until_agent_joins: true,
                videochat_autostart: true,
                start_with_fullscreen_videochat: true,
                videochat_prompt: true,
                start_muted: false,
                anyone_can_deactivate_space: true,
            });

            videochatSession.on("session_created", function (session, event) {
                console.log('Waiting for confirmation');
                session.startLeader(null, { name: "Agent" });
            }).on("session_started", function (session, event) {
                var surflySessionPin = session.pin;
                var surflyLeaderLink = session.followerLink;
                signalWorkItem(surflyLeaderLink);
                console.log("Videochat session started");
                console.log('Session Pin: ' + surflySessionPin);
                // Display the Queue Spinner
                var spinner = document.querySelector("#spinner-container");
                spinner.classList.remove("hidden");

                var cancelButton = document.querySelector("#btn-cancel-session");
                // If the Cancel button is clicked, end the work item and end the session
                cancelButton.addEventListener("click", function () {
                    session.end();
                });

                // Remove the button
                var button = document.querySelector("#start-button");
                button.classList.add("hidden");
            }).on("viewer_joined", function (session, event) {
                window.nicVideochatContactId = event.userData.contactId;
            }).on("session_ended", function (session, event) {
                console.log("Videochat session ended", event, session);

                endWorkItem(session.followerLink);

                // Remove the Queue Spinner
                var spinner = document.querySelector("#spinner-container");
                spinner.classList.add("hidden");
                // Add the button
                var button = document.querySelector("#start-button");
                button.classList.remove("hidden");
            }).create();
        };

        function cancelSession() {
            console.log("Canceling session...");
            var currentSession = Surfly.session();
            if (currentSession) {
                currentSession.end();
            }
        }


        function loadSurfly() {
            // Setup settings from API
            var settings = {
                widget_key: surflyWidgetKey,
                auto_restore: false,
                session_start_confirmation: false,
                hidden: false,
                disable_end_redirect: true,
                require_password: false,
                agent_can_request_control: true,
                automated_session_recording_enabled: true,
                end_redirect_enabled: true,
                new_urls_allowed: true,
                non_hosts_can_open_tabs: true,
            };

            Surfly.init(settings, function (initResult) {
                if (initResult.success) {
                    if (!Surfly.isInsideSession) {

                        if (localStorage.getItem(nicBusNumber + "-uniquePageId")) {
                            console.log("random: " + localStorage.getItem(nicBusNumber + "-uniquePageId"));
                        } else {
                            let randomString = Math.random().toString(36).substring(7);
                            let dateNow = Date.now();
                            let uniquePageId = randomString + "-" + dateNow;

                            console.log("random: " + uniquePageId);

                            localStorage.setItem(nicBusNumber + "-uniquePageId", uniquePageId);
                        }

                    }
                }
            });
        }

        function randomId() {
            console.log('it got here');
            let randomString = Math.random().toString(36).substring(7);
            let dateNow = Date.now();
            let uniquePageId = randomString + "-" + dateNow;
            console.log("random ID for Nice: " + uniquePageId);
            randomIdNice = uniquePageId;
        }

    </script>
</head>

<body class="pagecontainer">
    <div class="container" id="start-button">
        <header class="video-chat-hero" aria-label="Video chat">
            <p class="video-chat-eyebrow">You have arrived at the</p>
            <h1 class="video-chat-title">
                <span class="video-chat-title__glow">Video Chat</span>
                <span class="video-chat-title__page">Page</span>
            </h1>
            <p class="video-chat-tagline">Demo — open this page and start a video session whenever you are ready.</p>
        </header>
        <div>
            <button type="button" onclick="createVideochatSession()" class="start-button" id="startVideoBtn">
                Start Video
            </button>
        </div>
    </div>
    <div id="spinner-container" class="hidden">
        <div id="spinner">
            <div class="loader"></div>
            <p class="text-queue">Please wait to be connected</p>
            <button type="button" class="cancel-button" id="btn-cancel-session" onclick="cancelSession()">Cancel</button>
        </div>
    </div>
</body>
<style>

    }

    body {
        font-family: 'Outfit', var(--amn-font);
    }

    .pagecontainer {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;

    }

    .video-chat-hero {
        max-width: 36rem;
        margin: 0 auto 2rem;
        position: relative;
    }

    .video-chat-eyebrow {
        font-family: 'Outfit', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--light-blue);
        margin: 0 0 0.75rem;
        animation: fade-up 0.7s ease-out both;
    }

    .video-chat-title {
        font-family: 'Syne', sans-serif;
        font-size: clamp(2.75rem, 8vw, 4.25rem);
        font-weight: 800;
        line-height: 1.05;
        margin: 0 0 1.25rem;
        color: var(--dark-blue);
        animation: fade-up 0.75s ease-out 0.08s both;
    }

    .video-chat-title__glow {
        display: inline-block;
        background: linear-gradient(120deg, var(--blue) 0%, var(--light-blue) 45%, #ED780F 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 40px rgba(6, 103, 186, 0.25);
    }

    .video-chat-title__page {
        display: block;
        font-size: 0.55em;
        font-weight: 700;
        letter-spacing: 0.02em;

        margin-top: 0.15em;
    }

    .video-chat-tagline {
        font-size: 1.125rem;
        font-weight: 400;
        color: var(--text-grey);
        line-height: 1.55;
        margin: 0;
        animation: fade-up 0.8s ease-out 0.16s both;
    }

    @keyframes fade-up {
        from {
            opacity: 0;
            transform: translateY(12px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .container {
        display: flex;
        flex-direction: column;
    }

    .button-logo {
        margin: 0;
        padding: 0;
        width: 300px;
        height: 300px;
        border: none;
        cursor: pointer;
        border-radius: 10px;
    }

    .img-logo {
        width: 300px;
        height: 300px;
        border-radius: 10px;
    }

    .loader {
        border: 16px solid #f3f3f3;
        border-radius: 50%;
        border-top: 16px solid var(--blue);
        border-bottom: 16px solid #ED780F;
        border-left: 16px solid #89ADD0;
        border-right: 16px solid #9A4E0A;
        width: 120px;
        height: 120px;
        -webkit-animation: spin 2s linear infinite;
        animation: spin 2s linear infinite;
    }

    @-webkit-keyframes spin {
        0% {
            -webkit-transform: rotate(0deg);
        }

        100% {
            -webkit-transform: rotate(360deg);
        }
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .text-queue {
        font-size: 1.5rem;
        color: var(--blue);
        margin: 0;
        padding: 20px;
        margin: 20px;
    }

    #spinner {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .hidden {
        display: none
    }

    .start-button {
        background-color: var(--background-off-white);

        border-radius: 15px;
        border: 3px solid var(--blue);

    }

    .cancel-button {

        ;

    .cancel-button:hover {

        ;

</style>
