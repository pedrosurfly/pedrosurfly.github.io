<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DFO / CXone Test Page</title>
    <style>
      .surfly-btn {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .surfly-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
      }
      .surfly-btn:active {
        transform: translateY(0);
      }
    </style>
    <script>
      (function (n, u) {
        ((window.CXoneDfo = n),
          (window[n] =
            window[n] ||
            function () {
              (window[n].q = window[n].q || []).push(arguments);
            }),
          (window[n].u = u),
          (e = document.createElement("script")),
          (e.type = "module"),
          (e.src = u + "?" + Math.round(Date.now() / 1e3 / 3600)),
          document.head.appendChild(e));
      })(
        "cxone",
        "https://web-modules-de-na1.niceincontact.com/loader/1/loader.js",
      );

      cxone("init", "1022");
      cxone("chat", "init", 1022, "chat_4bc8d701-a316-4b5f-bc12-9c45f766dbd0");
      cxone("chat", "setAllowedExternalMessageTypes", [
        "MESSAGE_SENT",
        "MESSAGE_RECEIVED",
      ]);

      window.addEventListener("message", function (event) {
        console.log(event, `event ${new Date().toISOString()}`);

        // Ensure the data structure is as expected
        if (event.data && event.data.actionType === "MESSAGE_RECEIVED") {
          const messageContent = event.data.action?.message;

          // Check if the message content is "#COBROWSE#"
          if (messageContent === "#COBROWSE#") {
            console.log("Cobrowse message received:", event.data);

            // Check if Surfly is defined before calling session()
            // Surfly.session().startLeader();
            startCobrowse();
          }
        }
      });
      function startCobrowse() {
        let customerWidgetKey = "134f5fd2ac8842c0a1cd6062818eee74"; //set customer widget key to variable
        window.parent.Surfly.settings.widget_key = customerWidgetKey; //set customer widget key to widget_key high level
        if (window.parent.Surfly.settings.widget_key === customerWidgetKey) {
          // check if it worked to avoid null
          console.log("widget key change correctly", customerWidgetKey);
          Surfly.session().startLeader();
        }
      }
    </script>
  </head>
  <body>
    <h1>DFO / CXone Chat Tester</h1>
    <h2>Sub-title goes here</h2>
    <p>This is a test page for the DFO / CXone chat integration.</p>
    <p>
      It should display a chat window when the user clicks the button below.
    </p>
    <button type="button" class="surfly-btn" onclick="Surfly.session().startLeader()">
      Launch Surfly Session
    </button>
  </body>
</html>
