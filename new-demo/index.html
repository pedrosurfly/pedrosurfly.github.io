<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surfly × NICE CXone — Co-Browse Integration Demo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .be-template {
            z-index: 2147483549 !important;
        }
    </style>
    <script>
        (function (s, u, r, f, l, y) {
            s[f] = s[f] || {
                init: function () {
                    s[f].q = arguments;
                },
            };
            l = u.createElement(r);
            y = u.getElementsByTagName(r)[0];
            l.async = 1;
            l.src = "https://surfly.com/surfly.js";
            y.parentNode.insertBefore(l, y);
        })(window, document, "script", "Surfly");

        var settings = {
            // Surfly session options can be set here, or at the Company/Plan levels.
            widget_key: "134f5fd2ac8842c0a1cd6062818eee74",
            block_until_agent_joins: true,
        };

        Surfly.init(settings, function (initResult) {
            if (initResult.success) {
                // API calls can now be made!
                if (!Surfly.isInsideSession) {
                    (function (n, u) {
                        ((window.CXoneDfo = n),
                            (window[n] =
                                window[n] ||
                                function () {
                                    (window[n].q = window[n].q || []).push(arguments);
                                }),
                            (window[n].u = u),
                            (e = document.createElement("script")),
                            (e.type = "module"),
                            (e.src = u + "?" + Math.round(Date.now() / 1e3 / 3600)),
                            document.head.appendChild(e));
                    })(
                        "cxone",
                        "https://web-modules-de-na1.niceincontact.com/loader/1/loader.js",
                    );

                    cxone("init", "1022");
                    cxone("chat", "init", 1022, "chat_4bc8d701-a316-4b5f-bc12-9c45f766dbd0");

                    cxone("chat", "setAllowedExternalMessageTypes", [
                        "MESSAGE_SENT",
                        "MESSAGE_RECEIVED",
                    ]);

                    // Store the customer name from any earlier message in the session
                    let customerName = null;
                    let customerCaseNumber = null;

                    window.addEventListener("message", function (event) {
                        // Only process events re-dispatched from your own origin by the CXone widget
                        if (event.origin !== window.location.origin) return;

                        const data = event.data;
                        if (!data || data.actionType !== "MESSAGE_RECEIVED") return;

                        const action = data.action;
                        if (!action) return;

                        // Cache name and caseNumber whenever we see them populated
                        // inbound = customer message (direction: "inbound"), author has no userId
                        if (action.direction === "inbound" && action.author?.name) {
                            customerName = action.author.name;
                        }
                        if (action.caseNumber) {
                            customerCaseNumber = action.caseNumber;
                        }

                        const messageContent = action.message;

                        console.log(event, `event ${new Date().toISOString()}`);

                        // Ensure the data structure is as expected
                        if (event.data && event.data.actionType === "MESSAGE_RECEIVED") {
                            const messageContent = event.data.action?.message;

                            // Check if the message content is "#COBROWSE#"
                            if (messageContent === "#COBROWSE#") {
                                console.log("Cobrowse trigger received", { customerName, customerCaseNumber });

                                // Use cached values — the #COBROWSE# message itself will also have them
                                // but guard against the rare race where it fires on the optimistic echo
                                const name = customerName || action.author?.name || "Customer";
                                const caseNum = customerCaseNumber || action.caseNumber || "unknown";

                                Surfly.session().startLeader(null, {
                                    name: `${name} — Case ${caseNum}`
                                });
                            }
                        }
                    });
                }
            } else {
                console.log("Surfly was unable to initialize properly.");
            }
        });
    </script>
</head>

<body>

    <section class="hero">
        <div class="hero-glow"></div>
        <div class="hero-grid"></div>
        <div class="hero-inner">

            <div class="hero-left">
                <div class="integration-badge">
                    <div class="badge-logos">
                        <div class="badge-logo" style="background:var(--sf-orange);">
                            <svg width="12" height="12" viewBox="0 0 18 18" fill="none">
                                <path d="M3 13c2-4 4-6 6-4s4-1 6-5" stroke="#fff" stroke-width="2.2"
                                    stroke-linecap="round" />
                            </svg>
                        </div>
                        <span class="badge-x">×</span>
                        <div class="badge-logo" style="background:var(--nice-blue);">N</div>
                    </div>
                    <span class="badge-text">Surfly × NICE CXone Integration</span>
                </div>

                <h1>
                    Co-Browse, <span class="hl-orange">natively</span><br />
                    inside <span class="hl-blue">CXone</span>
                </h1>

                <p class="hero-sub">
                    Surfly's universal co-browsing engine, embedded directly into the NICE CXone agent console. No tab
                    switching. No plugins. One click from an active call to a live co-browse session.
                </p>

                <div class="hero-actions">
                    <button class="btn-cobrowse" onclick="startSurflySession()">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                        Start Co-Browse Session
                    </button>
                </div>
            </div>

        </div>
    </section>

    <script>
        function startSurflySession() {
            if (typeof Surfly !== 'undefined' && Surfly.session) {
                Surfly.session().startLeader();
            }
        }
    </script>
</body>

</html>
