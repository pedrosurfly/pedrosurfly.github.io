<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NICE CXone Chat — Surfly Co-Browse</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #ffffff;
        }
        .be-template {
            z-index: 2147483549 !important;
        }
    </style>

    <script>
        // --- Surfly loader ---
        (function (s, u, r, f, l, y) {
            s[f] = s[f] || {
                init: function () {
                    s[f].q = arguments;
                },
            };
            l = u.createElement(r);
            y = u.getElementsByTagName(r)[0];
            l.async = 1;
            l.src = "https://surfly.com/surfly.js";
            y.parentNode.insertBefore(l, y);
        })(window, document, "script", "Surfly");

        // --- Surfly × NICE CXone bridge ---
        (function (window) {
            window.SurflyNICEBridge = {
                init: function (options) {
                    options = options || {};

                    var trigger = options.trigger;
                    var matchesTrigger;

                    if (typeof trigger === "function") {
                        matchesTrigger = trigger;
                    } else if (trigger instanceof RegExp) {
                        matchesTrigger = function (msg) { return trigger.test(msg); };
                    } else if (typeof trigger === "string") {
                        matchesTrigger = function (msg) { return msg === trigger; };
                    } else {
                        matchesTrigger = function (msg) { return msg === "#COBROWSE#"; };
                    }

                    var customerName = null;
                    var customerCaseNumber = null;

                    window.addEventListener("message", function (event) {
                        if (event.origin !== window.location.origin) return;

                        var data = event.data;
                        if (!data || data.actionType !== "MESSAGE_RECEIVED") return;

                        var action = data.action;
                        if (!action) return;

                        if (action.direction === "inbound" && action.author && action.author.name) {
                            customerName = action.author.name;
                        }
                        if (action.caseNumber) {
                            customerCaseNumber = action.caseNumber;
                        }

                        if (!action.message || !matchesTrigger(action.message)) return;

                        var name = customerName || (action.author && action.author.name) || "Customer";
                        var caseNum = customerCaseNumber || action.caseNumber || "unknown";

                        console.log("[SurflyNICEBridge] Launching co-browse", { name: name, caseNum: caseNum });

                        if (typeof options.onStart === "function") {
                            options.onStart({ name: name, caseNum: caseNum });
                        } else {
                            Surfly.session().startLeader(null, {
                                name: name + " — Case " + caseNum
                            });
                        }
                    });
                }
            };
        })(window);
    </script>

    <script>
        Surfly.init({
            widget_key: "0181ebc6a5a94240b1e598d01c54a4cc",
            block_until_agent_joins: true
        }, function (initResult) {
            if (!initResult.success || Surfly.isInsideSession) return;

            // Load CXone
            (function (n, u) {
                ((window.CXoneDfo = n),
                    (window[n] =
                        window[n] ||
                        function () {
                            (window[n].q = window[n].q || []).push(arguments);
                        }),
                    (window[n].u = u),
                    (e = document.createElement("script")),
                    (e.type = "module"),
                    (e.src = u + "?" + Math.round(Date.now() / 1e3 / 3600)),
                    document.head.appendChild(e));
            })(
                "cxone",
                "https://web-modules-de-na2.nicecxone-gov.eu/loader/1/loader.js",
            );

            cxone("init", "1168");
            cxone("chat", "init", 1168, "chat_6c0a42e2-f031-4d5d-b163-4c0c18da40c7");
            cxone("chat", "setAllowedExternalMessageTypes", ["MESSAGE_SENT", "MESSAGE_RECEIVED"]);

            // Activate the bridge
            SurflyNICEBridge.init({
                trigger: /cobrowse|co-browse|4-digit pin/i
            });
        });
    </script>
</head>
