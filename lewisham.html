<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surfly × NICE CXone — Co-Browse Integration Demo</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        }
        .btn-cobrowse {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #ff5a1f, #ff7a3c);
            border: none;
            border-radius: 10px;
            padding: 16px 30px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 90, 31, 0.4);
            transition: transform 0.08s ease, box-shadow 0.15s ease;
        }
        .btn-cobrowse:hover {
            box-shadow: 0 10px 30px rgba(255, 90, 31, 0.55);
        }
        .btn-cobrowse:active {
            transform: translateY(1px);
        }
    </style>
    <script>
        // Load the Surfly snippet
        (function (s, u, r, f, l, y) {
            s[f] = s[f] || { init: function () { s[f].q = arguments } };
            l = u.createElement(r); y = u.getElementsByTagName(r)[0]; l.async = 1;
            l.src = 'https://surfly.com/surfly.js'; y.parentNode.insertBefore(l, y);
        })(window, document, 'script', 'Surfly');

        Surfly.init({
            widget_key: "2df9c6184f68404e99ac2691d3535f1e",
            block_until_agent_joins: true
        }, function (initResult) {
            if (!initResult.success || Surfly.isInsideSession) return;
        });
    </script>
</head>

<body>

    <button class="btn-cobrowse" onclick="startSurflySession()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Start Co-Browse Session
    </button>

    <script>
        function startSurflySession() {
            if (typeof Surfly !== 'undefined' && Surfly.session) {
                Surfly.session().startLeader();
            }
        }
    </script>
</body>

</html>
